<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Starward 2v2</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Noto+Sans+JP:wght@400;500;700&family=Share+Tech+Mono&display=swap');

  :root {
    --bg: #080a08;
    --panel: #0e110e;
    --panel2: #131713;
    --panel3: #1a1f1a;
    --border: #1e2a1e;
    --border2: #2a3a2a;
    --accent: #00ff6a;
    --accent2: #00bb4a;
    --accent-glow: rgba(0, 255, 106, 0.18);
    --text: #b8ccb0;
    --text2: #5a7a52;
    --teamA: #3B82F6;
    --teamA-dark: #1D4ED8;
    --teamB: #EF4444;
    --teamB-dark: #B91C1C;
    --charA1: #3B82F6;
    --charA1-dark: #1D4ED8;
    --charA2: #3B82F6;
    --charA2-dark: #1D4ED8;
    --charB1: #EF4444;
    --charB1-dark: #B91C1C;
    --charB2: #EF4444;
    --charB2-dark: #B91C1C;
    --awaken-color: #ffaa00;
    --scanline: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.07) 2px, rgba(0,0,0,0.07) 4px);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    background-image:
      radial-gradient(ellipse 80% 60% at 50% -10%, rgba(0,255,106,0.06) 0%, transparent 70%),
      var(--scanline);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px 16px;
  }

  /* ── HEADER ── */
  header {
    width: 100%;
    max-width: 800px;
    margin-bottom: 14px;

    display: flex;
    align-items: center;
    gap: 14px;
    padding: 0 2px;
  }

  .header-icon {
    width: 36px; height: 36px;
    border: 1.5px solid var(--accent);
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    background: var(--accent-glow);
    box-shadow: 0 0 12px var(--accent-glow), inset 0 0 8px var(--accent-glow);
    flex-shrink: 0;
  }
  .header-icon svg { width: 18px; height: 18px; fill: var(--accent); }

  .header-text { display: flex; flex-direction: column; gap: 1px; }

  header h1 {
    font-family: 'Rajdhani', sans-serif;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 0.14em;
    color: var(--accent);
    text-transform: uppercase;
    text-shadow: 0 0 18px rgba(0,255,106,0.5);
    line-height: 1;
  }

  header span {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--text2);
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  .header-sep {
    flex: 1;
    height: 1px;
    background: linear-gradient(to right, var(--border2), transparent);
    margin-left: 4px;
  }

  .header-status {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--accent2);
    letter-spacing: 0.1em;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .status-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 6px var(--accent);
    animation: blink 2s infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* ── CONTAINER ── */
  .container {
    width: 100%;
    max-width: 800px;
    background: var(--panel);
    border: 1px solid var(--border2);
    border-radius: 10px;
    padding: 14px;
    box-shadow: 0 0 40px rgba(0,0,0,0.6), 0 0 0 1px rgba(0,255,106,0.04);
    position: relative;
    overflow: hidden;
  }
  .container::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(to right, transparent, var(--accent2), transparent);
    opacity: 0.6;
  }

  /* ── TOOLBAR ── */
  .toolbar {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
    flex-wrap: wrap;
    align-items: stretch;
  }

  .tool-group {
    background: var(--panel2);
    border: 1px solid var(--border2);
    border-radius: 6px;
    padding: 5px 9px;
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
    position: relative;
    transition: border-color 0.2s;
  }
  .tool-group:hover { border-color: rgba(0,255,106,0.25); }

  .tool-group-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    font-weight: 400;
    color: var(--accent2);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 1px 0;
    white-space: nowrap;
  }

  .toolbar button, .toolbar select {
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 12px;
    font-weight: 500;
    padding: 0 11px;
    border-radius: 4px;
    border: 1px solid var(--border2);
    background: var(--panel3);
    color: var(--text2);
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.02em;
    height: 30px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    white-space: nowrap;
  }

  .toolbar button:hover:not(:disabled) {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(0,255,106,0.06);
    box-shadow: 0 0 8px rgba(0,255,106,0.12);
  }

  .toolbar button.active {
    background: rgba(0,255,106,0.12);
    border-color: var(--accent);
    color: var(--accent);
    font-weight: 700;
    box-shadow: inset 0 0 8px rgba(0,255,106,0.1), 0 0 8px rgba(0,255,106,0.15);
  }

  .toolbar button#btn-awaken:hover:not(:disabled) {
    border-color: var(--awaken-color);
    color: var(--awaken-color);
    background: rgba(255,170,0,0.06);
    box-shadow: 0 0 8px rgba(255,170,0,0.15);
  }
  .toolbar button#btn-awaken.awakening {
    background: linear-gradient(135deg, rgba(255,170,0,0.2), rgba(255,85,0,0.2));
    border-color: #ffaa00;
    color: #ffcc44;
    font-weight: 700;
    box-shadow: 0 0 12px rgba(255, 170, 0, 0.35), inset 0 0 8px rgba(255,170,0,0.1);
    animation: pulse-awaken 1.5s infinite;
  }

  .toolbar button:disabled, .toolbar select:disabled {
    opacity: 0.2;
    cursor: not-allowed;
    border-color: var(--border);
    color: var(--text2);
  }

  @keyframes pulse-awaken {
    0%,100% { box-shadow: 0 0 8px rgba(255,170,0,0.3), inset 0 0 6px rgba(255,170,0,0.08); }
    50%      { box-shadow: 0 0 20px rgba(255,170,0,0.6), inset 0 0 10px rgba(255,170,0,0.15); }
  }
  @keyframes pulse-play {
    0%,100% { box-shadow: 0 0 10px rgba(0,255,106,0.2); }
    50%      { box-shadow: 0 0 20px rgba(0,255,106,0.45); }
  }

  .toolbar select {
    padding: 0 26px 0 10px;
    outline: none;
    appearance: none;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='8' height='5' viewBox='0 0 8 5'><path fill='%235a7a52' d='M0 0l4 5 4-5z'/></svg>");
    background-repeat: no-repeat;
    background-position: right 8px center;
    background-color: var(--panel3);
    color: var(--text);
  }
  .toolbar select:focus { outline: none; border-color: var(--accent2); }
  .toolbar select option { background: var(--panel2); color: var(--text); }

  /* ── SEEKBAR ── */
  .seekbar-container {
    display: flex;
    align-items: center;
    gap: 10px;
    width: 100%;
    min-width: 200px;
  }
  .seekbar {
    flex-grow: 1;
    -webkit-appearance: none;
    appearance: none;
    background: var(--panel3);
    height: 4px;
    border-radius: 2px;
    outline: none;
    cursor: pointer;
    border: none;
    position: relative;
  }
  .seekbar::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 13px;
    height: 13px;
    border-radius: 2px;
    background: var(--accent);
    cursor: pointer;
    border: none;
    box-shadow: 0 0 6px rgba(0,255,106,0.5);
    transition: transform 0.1s, box-shadow 0.1s;
  }
  .seekbar::-webkit-slider-thumb:hover {
    transform: scale(1.25);
    box-shadow: 0 0 10px rgba(0,255,106,0.7);
  }
  .time-display {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: var(--text2);
    min-width: 72px;
    text-align: right;
    letter-spacing: 0.06em;
  }

  /* ── ICON BUTTONS ── */
  .icon-btn {
    display: inline-flex !important;
    align-items: center;
    gap: 5px;
    padding: 0 10px !important;
  }
  .icon-btn svg {
    width: 12px; height: 12px;
    fill: none;
    stroke: currentColor;
    stroke-width: 1.5;
    stroke-linecap: round;
    stroke-linejoin: round;
    flex-shrink: 0;
  }
  .icon-btn span {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
  }
  .icon-btn:disabled svg { stroke: currentColor; }

  .op-btn {
    height: 36px !important;
    padding: 0 14px !important;
    font-size: 13px !important;
    gap: 7px !important;
  }
  .op-btn svg {
    width: 14px !important;
    height: 14px !important;
  }
  .op-btn span {
    font-family: 'Noto Sans JP', sans-serif !important;
    font-size: 13px !important;
    letter-spacing: 0.02em !important;
  }

  .icon-btn-warn:hover:not(:disabled) {
    border-color: #ff6644 !important;
    color: #ff6644 !important;
    background: rgba(255,100,68,0.07) !important;
    box-shadow: 0 0 8px rgba(255,100,68,0.15) !important;
  }

  .btn-divider {
    width: 1px;
    height: 18px;
    background: var(--border2);
    flex-shrink: 0;
    margin: 0 2px;
  }

  /* ── PLAY BUTTON ── */
  .play-btn {
    display: inline-flex !important;
    align-items: center;
    gap: 7px;
    padding: 0 14px !important;
    height: 30px;
    border-color: var(--accent2) !important;
    color: var(--accent) !important;
    background: rgba(0,255,106,0.06) !important;
    font-weight: 700;
    position: relative;
    overflow: hidden;
  }
  .play-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, transparent, rgba(0,255,106,0.08), transparent);
    transform: translateX(-100%);
    transition: transform 0.4s;
  }
  .play-btn:hover:not(:disabled)::before { transform: translateX(100%); }
  .play-btn:hover:not(:disabled) {
    border-color: var(--accent) !important;
    box-shadow: 0 0 16px rgba(0,255,106,0.25) !important;
    background: rgba(0,255,106,0.1) !important;
  }
  .play-btn.playing {
    border-color: var(--accent) !important;
    color: var(--accent) !important;
    background: rgba(0,255,106,0.12) !important;
    box-shadow: 0 0 18px rgba(0,255,106,0.3), inset 0 0 10px rgba(0,255,106,0.08) !important;
    animation: pulse-play 1.2s infinite !important;
  }
  .play-btn svg {
    width: 11px; height: 11px;
    fill: currentColor;
    flex-shrink: 0;
  }
  .play-btn span {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.14em;
  }

  .timeline-group {
    min-width: 0;
  }

  /* ── CANVAS ── */
  canvas {
    display: block;
    width: 100%;
    border-radius: 6px;
    border: 1px solid var(--border2);
    cursor: default;
    touch-action: none;
    box-shadow: 0 0 0 1px rgba(0,255,106,0.04), inset 0 0 30px rgba(0,0,0,0.3);
  }

  /* ── INFO BAR ── */
  .info-bar {
    margin-top: 10px;
    padding: 7px 12px 7px 14px;
    background: var(--panel2);
    border: 1px solid var(--border2);
    border-radius: 5px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: var(--text2);
    min-height: 32px;
    display: flex;
    align-items: center;
    gap: 8px;
    border-left: 2px solid var(--accent2);
    letter-spacing: 0.05em;
  }
  .info-bar::before {
    content: '▶';
    color: var(--accent2);
    font-size: 8px;
    flex-shrink: 0;
  }

  /* ── LEGEND ── */
  .legend {
    display: flex;
    gap: 14px;
    margin-top: 12px;
    flex-wrap: wrap;
    align-items: center;
    padding: 8px 10px;
    background: var(--panel2);
    border: 1px solid var(--border);
    border-radius: 5px;
  }

  .legend-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    color: var(--text2);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-right: 2px;
    opacity: 0.7;
  }

  .leg {
    display: flex;
    align-items: center;
    gap: 5px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--text2);
    letter-spacing: 0.04em;
  }

  .leg-dot {
    width: 12px; height: 12px;
    border-radius: 50%;
    border: 1.5px solid rgba(0,0,0,0.4);
    flex-shrink: 0;
  }

  .leg-ln {
    width: 18px;
    height: 3px;
    border-radius: 1px;
  }

  /* ── FOOTER ── */
  footer {
    margin-top: 12px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--text2);
    opacity: 0.35;
    letter-spacing: 0.08em;
    text-align: center;
  }
</style>
</head>
<body>

<header>
  <div class="header-icon">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
  </div>
  <div class="header-text">
    <h1>2v2 Tactical Map</h1>
    <span id="header-stage-name">TRAINING STAGE</span>
  </div>
  <div class="header-sep"></div>
</header>

<div class="container">
  <div class="toolbar">
    
    <div class="tool-group">
      <span class="tool-group-label">ステージ</span>
      <select id="select-stage" onchange="changeStage()">
        <option value="training">トレーニングステージ</option>
        <option value="furnace">ファーネスコア</option>
        <option value="create">クリエイトステージ</option>
      </select>
    </div>
    
    <div class="tool-group">
      <span class="tool-group-label">モード</span>
      <button id="btn-move" class="active" onclick="setMode('move')">移動</button>
      <button id="btn-arrow" onclick="setMode('arrow')">➡ 直線矢印</button>
      <button id="btn-route" onclick="setMode('route')">ルート描画</button>
      <button id="btn-text" onclick="setMode('text')">メモ配置</button>
      <select id="select-arrow-type" style="display: none;" onchange="changeArrowType()">
        <option value="normal">通常移動（点線）</option>
        <option value="follow">ターゲット追従 (自動判定)</option>
      </select>
    </div>

    <div class="tool-group" id="group-object" style="display:none;">
      <span class="tool-group-label">図形配置</span>
      <button id="btn-shape-rect"     onclick="setShapeType('rect')"    class="active">▭ 矩形</button>
      <button id="btn-shape-circle"   onclick="setShapeType('circle')"  >⬤ 円</button>
      <button id="btn-shape-triangle" onclick="setShapeType('triangle')">▲ 三角</button>
      <button id="btn-shape-diamond"  onclick="setShapeType('diamond')" >◆ ひし形</button>
      <label style="display:flex;align-items:center;gap:5px;font-size:12px;color:var(--text2);cursor:pointer;">
        色: <input type="color" id="obj-color-pick" value="#3a7aaa" style="width:32px;height:24px;border:none;background:none;cursor:pointer;padding:0;">
      </label>
      <label style="display:flex;align-items:center;gap:5px;font-size:12px;color:var(--text2);">
        不透明度: <input type="range" id="obj-opacity" min="20" max="100" value="80" style="width:60px;">
      </label>
      <button onclick="clearStageObjects()" style="margin-left:4px;">🗑 全消去</button>
    </div>
      <button id="btn-toggle-lockcircle" onclick="toggleLockCircle()" title="赤ロック円の表示切り替え">⭕ 赤ロック円: 選択対象のみ</button>

    </div>
    
    <div class="tool-group">
      <span class="tool-group-label">キャラ編集</span>
      <select id="select-cost" onchange="updateCharaList()" disabled>
        <option value="">コスト選択</option>
        <option value="30">30c</option>
        <option value="25">25c</option>
        <option value="20">20c</option>
        <option value="15">15c</option>
      </select>
      <select id="select-chara" onchange="changeCharacter()" disabled>
        <option value="">キャラ選択</option>
      </select>
      <button id="btn-awaken" onclick="toggleAwaken()" disabled title="選択中のキャラの覚醒状態を切り替えます">覚醒</button>
    </div>

    <div class="tool-group">
      <span class="tool-group-label">操作</span>
      <button id="btn-undo" onclick="undo()" disabled title="1つ前に戻る" class="icon-btn op-btn">
        <svg viewBox="0 0 16 16"><path d="M4 8a4 4 0 1 0 4-4H5.5L7 2.5 5.5 1 2 4.5 5.5 8 7 6.5 5.83 5.5H8a2.5 2.5 0 1 1 0 5H4V8z"/></svg>
        <span>戻る</span>
      </button>
      <button id="btn-redo" onclick="redo()" disabled title="1つ進む" class="icon-btn op-btn">
        <svg viewBox="0 0 16 16" style="transform:scaleX(-1)"><path d="M4 8a4 4 0 1 0 4-4H5.5L7 2.5 5.5 1 2 4.5 5.5 8 7 6.5 5.83 5.5H8a2.5 2.5 0 1 1 0 5H4V8z"/></svg>
        <span>進める</span>
      </button>
      <div class="btn-divider"></div>
      <button onclick="executeClearArrows()" class="icon-btn icon-btn-warn op-btn" title="矢印・ルート消去">
        <svg viewBox="0 0 16 16"><path d="M2 4h12M5 4V2h6v2M3 4l1 10h8l1-10"/></svg>
        <span>矢印消去</span>
      </button>
      <button onclick="executeResetPositions()" class="icon-btn icon-btn-warn op-btn" title="全リセット">
        <svg viewBox="0 0 16 16"><path d="M13.5 8A5.5 5.5 0 1 1 8 2.5M13.5 2v4h-4"/></svg>
        <span>全リセット</span>
      </button>
    </div>

    <div class="tool-group timeline-group" style="flex-grow: 1;">
      <span class="tool-group-label">タイムライン</span>
      <select id="select-play-mode" class="play-mode-select">
        <option value="all">⚡ 一括</option>
        <option value="sequence">⏳ 順番</option>
      </select>
      <button id="btn-play" onclick="handlePlaybackClick()" class="play-btn">
        <svg id="play-icon" viewBox="0 0 16 16"><polygon points="4,2 14,8 4,14"/></svg>
        <svg id="pause-icon" viewBox="0 0 16 16" style="display:none"><rect x="3" y="2" width="4" height="12"/><rect x="9" y="2" width="4" height="12"/></svg>
        <span id="play-label">PLAY</span>
      </button>
      <div class="seekbar-container">
        <input type="range" id="animation-seekbar" class="seekbar" min="0" max="100" value="0" oninput="handleSeek(this.value)">
        <span id="time-display" class="time-display">0.0s / 0.0s</span>
      </div>
    </div>

  </div>

  <div id="canvas-wrapper" style="overflow: auto; width: 100%; position: relative;">
    <canvas id="c"></canvas>
    <div id="memo-input-overlay" style="display:none; position:absolute; z-index:100; background:var(--panel2); border:1px solid var(--accent2); border-radius:6px; padding:10px 12px; box-shadow:0 0 24px rgba(0,255,106,0.15), 0 4px 20px rgba(0,0,0,0.7); min-width:210px;">
      <div style="font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--accent2);letter-spacing:0.12em;text-transform:uppercase;margin-bottom:8px;">▶ NOTE INPUT</div>
      <input id="memo-input-field" type="text" placeholder="テキストを入力..." style="width:100%;background:var(--panel3);border:1px solid var(--border2);border-radius:4px;color:var(--text);font-size:12px;padding:5px 8px;outline:none;font-family:'Noto Sans JP',sans-serif;letter-spacing:0.02em;">
      <div style="display:flex;gap:6px;margin-top:8px;justify-content:flex-end;">
        <button id="memo-cancel-btn" style="font-family:'Share Tech Mono',monospace;font-size:10px;padding:4px 10px;border-radius:3px;border:1px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;letter-spacing:0.08em;">CANCEL</button>
        <button id="memo-ok-btn" style="font-family:'Share Tech Mono',monospace;font-size:10px;padding:4px 10px;border-radius:3px;border:1px solid var(--accent2);background:rgba(0,255,106,0.1);color:var(--accent);font-weight:700;cursor:pointer;letter-spacing:0.08em;box-shadow:0 0 8px rgba(0,255,106,0.15);">PLACE</button>
      </div>
    </div>
  </div>

  <div style="display:flex;align-items:center;gap:10px;margin-top:8px;padding:6px 10px;background:var(--panel2);border:1px solid var(--border2);border-radius:5px;">

function hexToRgba(hex, alpha) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${alpha})`;
}

function setShapeType(type) {
  selectedShapeType = type;
  ['rect','circle','triangle','diamond'].forEach(k => {
    const btn = document.getElementById('btn-shape-' + k);
    if (btn) btn.classList.toggle('active', k === type);
  });
}

// オブジェクトのピクセル座標・サイズを返す
function objPx(o) {
  return { x: o.nx*W, y: o.ny*H, w: o.nw*W, h: o.nh*H };
}

// ヒットテスト（ボディ）
function getStageObj(x, y) {
  for (let i = stageObjects.length - 1; i >= 0; i--) {
    const o = stageObjects[i];
    const { x: ox, y: oy, w: ow, h: oh } = objPx(o);
    if (x >= ox && x <= ox+ow && y >= oy && y <= oy+oh) return o;
  }
  return null;
}

// リサイズハンドル取得（選択中のオブジェクトのみ）: 'se','sw','ne','nw','e','s','w','n'
const HANDLES = ['nw','n','ne','e','se','s','sw','w'];
function getResizeHandle(o, x, y) {
  const { x: ox, y: oy, w: ow, h: oh } = objPx(o);
  const hs = 9; // ハンドルの半径
  const pts = {
    nw: [ox, oy],       n: [ox+ow/2, oy],    ne: [ox+ow, oy],
    e:  [ox+ow, oy+oh/2],                    se: [ox+ow, oy+oh],
    s:  [ox+ow/2, oy+oh], sw: [ox, oy+oh],   w:  [ox, oy+oh/2]
  };
  for (const h of HANDLES) {
    const [hx, hy] = pts[h];
    if (Math.abs(x - hx) <= hs && Math.abs(y - hy) <= hs) return h;
  }
  return null;
}

function drawShapePath(ctx, shape, x, y, w, h) {
  ctx.beginPath();
  if (shape === 'rect') {
    ctx.rect(x, y, w, h);
  } else if (shape === 'circle') {
    ctx.ellipse(x + w/2, y + h/2, w/2, h/2, 0, 0, Math.PI*2);
  } else if (shape === 'triangle') {
    ctx.moveTo(x + w/2, y);
    ctx.lineTo(x + w, y + h);
    ctx.lineTo(x, y + h);
    ctx.closePath();
  } else if (shape === 'diamond') {
    ctx.moveTo(x + w/2, y);
    ctx.lineTo(x + w, y + h/2);
    ctx.lineTo(x + w/2, y + h);
    ctx.lineTo(x, y + h/2);
    ctx.closePath();
  }
}

function drawStageObject(o, isSel) {
  const { x, y, w, h } = objPx(o);
  if (w < 2 || h < 2) return;
  const alpha = (o.opacity ?? 80) / 100;
  ctx.save();
  ctx.fillStyle = hexToRgba(o.color, alpha);
  ctx.strokeStyle = isSel ? '#00ee66' : hexToRgba(o.color, Math.min(1, alpha + 0.3));
  ctx.lineWidth = isSel ? 2.5 : 1.5;
  if (isSel) { ctx.shadowColor = '#00ee66'; ctx.shadowBlur = 8; }
  drawShapePath(ctx, o.shape, x, y, w, h);
  ctx.fill(); ctx.stroke();
  ctx.restore();

  // リサイズハンドル（選択中のみ）
  if (isSel) {
    const { x: ox, y: oy, w: ow, h: oh } = objPx(o);
    const pts = {
      nw: [ox, oy],       n: [ox+ow/2, oy],    ne: [ox+ow, oy],
      e:  [ox+ow, oy+oh/2],                    se: [ox+ow, oy+oh],
      s:  [ox+ow/2, oy+oh], sw: [ox, oy+oh],   w:  [ox, oy+oh/2]
    };
    ctx.save();
    HANDLES.forEach(h => {
      const [hx, hy] = pts[h];
      ctx.beginPath(); ctx.arc(hx, hy, 6, 0, Math.PI*2);
      ctx.fillStyle = '#fff'; ctx.fill();
      ctx.strokeStyle = '#00ee66'; ctx.lineWidth = 2; ctx.stroke();
    });
    ctx.restore();
  }
}

// ドラッグ中プレビュー
function drawObjPreview(x1, y1, x2, y2) {
  const x = Math.min(x1,x2), y = Math.min(y1,y2);
  const w = Math.abs(x2-x1), h = Math.abs(y2-y1);
  if (w < 2 || h < 2) return;
  const color = document.getElementById('obj-color-pick').value;
  const alpha = parseInt(document.getElementById('obj-opacity').value) / 100;
  ctx.save();
  ctx.fillStyle = hexToRgba(color, alpha * 0.6);
  ctx.strokeStyle = hexToRgba(color, 0.9);
  ctx.lineWidth = 2; ctx.setLineDash([5,4]);
  drawShapePath(ctx, selectedShapeType, x, y, w, h);
  ctx.fill(); ctx.stroke();
  ctx.restore();
}

  selectChara.disabled = true;
  btnAwaken.disabled = true;
  btnAwaken.classList.remove('awakening');
  resetSeekbar();
  info.textContent = 'リセットしました。';
  draw();
}

function handleSelection(item) {
  if (isPlaying) return;
  if (item && mode === 'move') {
    selected = item;
    if (item.nx !== undefined) {
      selectCost.disabled = false;
      selectCost.value = "";
      selectChara.innerHTML = '<option value="">キャラ選択</option>';
      selectChara.disabled = true;
      btnAwaken.disabled = false;
      updateAwakenButtonState();
      info.textContent = `${item.role}を選択（ゲーム内赤ロック値: ${item.rawValue || '??'}）${item.isAwaken ? '【覚醒中】' : ''}`;
    } else {
      selectCost.disabled = true;
      selectChara.disabled = true;
      btnAwaken.disabled = true;
      btnAwaken.classList.remove('awakening');
      info.textContent = `メモ「${item.text}」を選択中。`;
    }
  } else {
    selected = null;
    selectCost.disabled = true;
    selectChara.disabled = true;
    btnAwaken.disabled = true;
    btnAwaken.classList.remove('awakening');
  }
}

function updateAwakenButtonState() {
  if (selected && selected.nx !== undefined) {
    if (selected.isAwaken) {
      btnAwaken.classList.add('awakening');
      btnAwaken.textContent = '覚醒中';
    } else {
      btnAwaken.classList.remove('awakening');
      btnAwaken.textContent = '覚醒';
    }
  }
}

function toggleAwaken() {
  if (!selected || selected.nx === undefined || isPlaying) return;
  saveState();
  selected.isAwaken = !selected.isAwaken;
  updateAwakenButtonState();
  info.textContent = `${selected.role}を${selected.isAwaken ? '覚醒状態' : '通常状態'}にしました。`;
  draw();
}

function updateCharaList() {
  const cost = selectCost.value;
  selectChara.innerHTML = '<option value="">キャラ選択</option>';
  if (!cost || !charaDatabase[cost]) { selectChara.disabled = true; return; }
  charaDatabase[cost].forEach(chara => {
    const opt = document.createElement('option');
    opt.value = `${cost}|${chara.file}|${chara.name}|${chara.redLock}|${chara.rawValue}`;
    opt.textContent = chara.name;
    selectChara.appendChild(opt);
  });
  selectChara.disabled = false;
}

function changeCharacter() {
  if (!selected || !selectChara.value || isPlaying) return;
  saveState();
  const [cost, file, name, redLockStr, rawValueStr] = selectChara.value.split('|');
  const targetRedLock = parseInt(redLockStr, 10);
  const targetRawValue = parseInt(rawValueStr, 10);
  const img = new Image();
  img.src = `img/${cost}/${file}.png`;
  
  img.onload = function() {
    selected.img = img; selected.role = name; selected.redLock = targetRedLock; selected.rawValue = targetRawValue;
    draw();
  };
  img.onerror = function() {
    selected.img = null; selected.role = name; selected.redLock = targetRedLock; selected.rawValue = targetRawValue;
    draw();
  };
}

// ==========================================
// 【新実装】タイムライン事前計算 ＆ シークバー連動システム
// ==========================================
function resetSeekbar() {
  const routeArrows = arrows.filter(a => a.arrowType === 'route' && a.points && a.points.length > 1);
  if (routeArrows.length === 0) {
    seekbar.max = 100; seekbar.value = 0; seekbar.disabled = true;
    timeDisplay.textContent = "0.0s / 0.0s";
    return;
  }
  seekbar.disabled = false;
  buildPlaybackTimeline();
  updateSeekbarUI(0);
}

// 全てのフレームにおける各キャラクターの位置を予め配列にシミュレート・キャッシュする
function buildPlaybackTimeline() {
  const routeArrows = arrows.filter(a => a.arrowType === 'route' && a.points && a.points.length > 1);
  if (routeArrows.length === 0) return;

  baseCharsState = chars.map(c => ({ id: c.id, nx: c.nx, ny: c.ny }));
  playbackTimelineData = [];

  const stepsPerSegment = 3;
  const playMode = selectPlayMode.value;

  // 前ルート終点 → 次ルート始点の距離に応じた補間ポイント列を生成
  function makeBridgePoints(fromPt, toPt) {
    const dist = Math.hypot((toPt.nx - fromPt.nx) * W, (toPt.ny - fromPt.ny) * H);
    if (dist < 2) return []; // ほぼ同じ場所なら補間不要
    // 距離に比例したステップ数（最低1、最大は通常ルートと同密度）
    const steps = Math.max(1, Math.round(dist / (W * 0.02)));
    const pts = [];
    for (let i = 0; i <= steps; i++) {
      pts.push({ nx: fromPt.nx + (toPt.nx - fromPt.nx) * (i / steps),
                 ny: fromPt.ny + (toPt.ny - fromPt.ny) * (i / steps) });
    }
    return pts;
  }

  // 同一キャラの複数ルートを「ブリッジ補間」付きで連結
  function buildChainedTasks(arrows) {
    const charRoutes = {};
    arrows.forEach(a => {
      if (!charRoutes[a.startCharId]) charRoutes[a.startCharId] = [];
      charRoutes[a.startCharId].push(a.points);
    });
    return Object.entries(charRoutes).map(([charId, routeList]) => {
      const chained = [...routeList[0]];
      for (let i = 1; i < routeList.length; i++) {
        const prevEnd = chained[chained.length - 1];
        const nextStart = routeList[i][0];
        // 終点と始点が離れていたらブリッジ補間を挿入
        const bridge = makeBridgePoints(prevEnd, nextStart);
        if (bridge.length > 1) {
          // bridge[0] は prevEnd と同じなので skip、bridge最後 = nextStart
          for (let b = 1; b < bridge.length; b++) chained.push(bridge[b]);
        }
        // 次ルートは始点（= bridge終点）から
        for (let j = 1; j < routeList[i].length; j++) chained.push(routeList[i][j]);
      }
      return { charId, points: chained };
    });
  }

  if (playMode === 'all') {
    const tasks = buildChainedTasks(routeArrows);
    let maxFrames = 0;
    tasks.forEach(t => {
      const totalF = (t.points.length - 1) * stepsPerSegment;
      if (totalF > maxFrames) maxFrames = totalF;
    });
    totalPlaybackFrames = maxFrames;

    for (let f = 0; f <= totalPlaybackFrames; f++) {
      let frameSnapshot = {};
      tasks.forEach(t => {
        const segIndex = Math.floor(f / stepsPerSegment);
        const subStep = f % stepsPerSegment;
        if (segIndex >= t.points.length - 1) {
          const lastPt = t.points[t.points.length - 1];
          frameSnapshot[t.charId] = { nx: lastPt.nx, ny: lastPt.ny };
        } else {
          const p1 = t.points[segIndex];
          const p2 = t.points[segIndex + 1];
          const ratio = subStep / stepsPerSegment;
          frameSnapshot[t.charId] = {
            nx: p1.nx + (p2.nx - p1.nx) * ratio,
            ny: p1.ny + (p2.ny - p1.ny) * ratio
          };
        }
      });
      playbackTimelineData.push(frameSnapshot);
    }
  } else {
    // ---- 順番再生モード ----
    // ルート間にブリッジタスクを挿入
    const charLastEnd = {}; // charId -> 直前ルートの終点
    const tasks = [];

    routeArrows.forEach(a => {
      const charId = a.startCharId;
      const prevEnd = charLastEnd[charId];
      const thisStart = a.points[0];

      // 前のルート終点と今のルート始点が離れていたらブリッジを先に挿入
      if (prevEnd) {
        const bridge = makeBridgePoints(prevEnd, thisStart);
        if (bridge.length > 1) {
          tasks.push({ charId, points: bridge, isBridge: true });
        }
      }
      tasks.push({ charId, points: a.points, isBridge: false });
      charLastEnd[charId] = a.points[a.points.length - 1];
    });

    // startF / endF を付与
    let currentStartFrame = 0;
    tasks.forEach(t => {
      const framesCount = (t.points.length - 1) * stepsPerSegment;
      t.startF = currentStartFrame;
      t.endF = currentStartFrame + framesCount;
      currentStartFrame += framesCount;
    });
    totalPlaybackFrames = currentStartFrame;

    const charEndPos = {};
    for (let f = 0; f <= totalPlaybackFrames; f++) {
      let frameSnapshot = {};
      tasks.forEach(t => {
        if (f <= t.startF) {
          frameSnapshot[t.charId] = charEndPos[t.charId] || { nx: t.points[0].nx, ny: t.points[0].ny };
        } else if (f >= t.endF) {
          const lastPt = t.points[t.points.length - 1];
          frameSnapshot[t.charId] = { nx: lastPt.nx, ny: lastPt.ny };
          charEndPos[t.charId] = frameSnapshot[t.charId];
        } else {
          const myFrame = f - t.startF;
          const segIndex = Math.floor(myFrame / stepsPerSegment);
          const subStep = myFrame % stepsPerSegment;
          const p1 = t.points[segIndex];
          const p2 = t.points[segIndex + 1];
          const ratio = subStep / stepsPerSegment;
          frameSnapshot[t.charId] = {
            nx: p1.nx + (p2.nx - p1.nx) * ratio,
            ny: p1.ny + (p2.ny - p1.ny) * ratio
          };
        }
      });
      playbackTimelineData.push(frameSnapshot);
    }
  }

  seekbar.max = totalPlaybackFrames;
}

function updateSeekbarUI(frame) {
  seekbar.value = frame;
  // 1フレームあたりを約0.05秒(60FPS相当の近似)として秒数表記を計算
  const currentSec = (frame * 0.05).toFixed(1);
  const totalSec = (totalPlaybackFrames * 0.05).toFixed(1);
  timeDisplay.textContent = `${currentSec}s / ${totalSec}s`;
}

// タイムラインを特定フレームの状態に強制適用する
function applyTimelineFrame(frame) {
  if (playbackTimelineData.length === 0 || !playbackTimelineData[frame]) return;
  const snapshot = playbackTimelineData[frame];
  
  chars.forEach(c => {
    if (snapshot[c.id]) {
      c.nx = snapshot[c.id].nx;
      c.ny = snapshot[c.id].ny;
    } else {
      // ルートが描かれていないキャラは、再生開始前の元の位置に維持
      const base = baseCharsState.find(b => b.id === c.id);
      if (base) { c.nx = base.nx; c.ny = base.ny; }
    }
  });
}

// ユーザーが手動でシークバーを動かしたときの処理
function handleSeek(value) {
  if (isPlaying) endPlayback(); // シークされたら再生は一旦停止
  
  if (playbackTimelineData.length === 0) {
    buildPlaybackTimeline();
  }
  
  currentProgressFrame = parseInt(value, 10);
  applyTimelineFrame(currentProgressFrame);
  updateSeekbarUI(currentProgressFrame);
  draw();
}

function handlePlaybackClick() {
  if (isPlaying) {
    endPlayback();
  } else {
    startPlayback();
  }
}

function startPlayback() {
  const routeArrows = arrows.filter(a => a.arrowType === 'route' && a.points && a.points.length > 1);
  if (routeArrows.length === 0) {
    info.textContent = '再生する自由ルートがありません。「ルート描画」でルートを描いてください。';
    return;
  }

  isPlaying = true;
  selected = null;
  
  // 再生中は誤動作を防ぐため、再生モード選択のみロック
  selectPlayMode.disabled = true;
  
  const playBtn = document.getElementById('btn-play');
  playBtn.classList.add('playing');
  document.getElementById('play-icon').style.display = 'none';
  document.getElementById('pause-icon').style.display = '';
  document.getElementById('play-label').textContent = 'STOP';

  // もしシークバーが最後までいっている状態で再生を押したら最初から巻き戻す
  if (currentProgressFrame >= totalPlaybackFrames) {
    currentProgressFrame = 0;
  }

  buildPlaybackTimeline();
  info.textContent = 'ルート移動アニメーションを再生中...';

  function animLoop() {
    if (!isPlaying) return;

    if (currentProgressFrame <= totalPlaybackFrames) {
      applyTimelineFrame(currentProgressFrame);
      updateSeekbarUI(currentProgressFrame);
      draw();
      currentProgressFrame++;
      animationFrameId = requestAnimationFrame(animLoop);
    } else {
      info.textContent = '再生が完了しました。';
      endPlayback();
    }
  }
  animationFrameId = requestAnimationFrame(animLoop);
}

function endPlayback() {
  isPlaying = false;
  if (animationFrameId) {
    cancelAnimationFrame(animationFrameId);
    animationFrameId = null;
  }
  selectPlayMode.disabled = false;
  const playBtn = document.getElementById('btn-play');
  playBtn.classList.remove('playing');
  document.getElementById('play-icon').style.display = '';
  document.getElementById('pause-icon').style.display = 'none';
  document.getElementById('play-label').textContent = 'PLAY';
  draw();
}

// ==========================================
// マウス・タッチイベント・個別削除機能
// ==========================================
function scalePos(e) {
  const rect = canvas.getBoundingClientRect();
  const sx = W / rect.width, sy = H / rect.height;
  let clientX = e.clientX, clientY = e.clientY;
  
  if (e.touches && e.touches.length > 0) {
    clientX = e.touches[0].clientX; clientY = e.touches[0].clientY;
  } else if (e.changedTouches && e.changedTouches.length > 0) {
    clientX = e.changedTouches[0].clientX; clientY = e.changedTouches[0].clientY;
  }
  return { x: (clientX - rect.left) * sx, y: (clientY - rect.top) * sy };
}

// 矢印の終点付近にいるか判定し、あればその矢印を返す
function getArrowNearTip(x, y) {
  const threshold = 20;
  for (let i = arrows.length - 1; i >= 0; i--) {
    const a = arrows[i];
    let tx, ty;
    if (a.arrowType === 'route' && a.points && a.points.length > 1) {
      const last = a.points[a.points.length - 1];
      tx = last.nx * W; ty = last.ny * H;
    } else if (a.arrowType === 'follow') {
      const eCh = chars.find(c => c.id === a.endCharId);
      if (!eCh) continue;
      tx = cx(eCh); ty = cy(eCh);
    } else if (a.x2 !== undefined) {
      tx = a.x2; ty = a.y2;
    } else continue;
    if (Math.hypot(x - tx, y - ty) < threshold) return a;
  }
  return null;
}

function getChar(x, y) {
  const rad = r() + 4;
  for (let i = chars.length - 1; i >= 0; i--) {
    if (Math.hypot(x - cx(chars[i]), y - cy(chars[i])) < rad) return chars[i];
  }
  return null;
}

function getNote(x, y) {
  ctx.font = "12px 'Noto Sans JP', sans-serif";
  for (let i = notes.length - 1; i >= 0; i--) {
    const n = notes[i];
    const tw = ctx.measureText(n.text).width + 12;
    const th = 22;
    const nx = n.nx * W, ny = n.ny * H;
    if (x >= nx - tw/2 && x <= nx + tw/2 && y >= ny - th/2 && y <= ny + th/2) return n;
  }
  return null;
}

function getArrow(x, y) {
  const threshold = 14; 
  for (let i = arrows.length - 1; i >= 0; i--) {
    const a = arrows[i];
    if (a.arrowType === 'route' && a.points) {
      for (let j = 0; j < a.points.length - 1; j++) {
        const x1 = a.points[j].nx * W, y1 = a.points[j].ny * H;
        const x2 = a.points[j+1].nx * W, y2 = a.points[j+1].ny * H;
        if (distToSegment(x, y, x1, y1, x2, y2) < threshold) return a;
      }
      continue;
    }
    let x1, y1, x2, y2;
    if (a.arrowType === 'follow') {
      const sCh = chars.find(c => c.id === a.startCharId);
      const eCh = chars.find(c => c.id === a.endCharId);
      if (!sCh || !eCh) continue;
      x1 = cx(sCh); y1 = cy(sCh); x2 = cx(eCh); y2 = cy(eCh);
    } else {
      x1 = a.x1; y1 = a.y1; x2 = a.x2; y2 = a.y2;
    }
    if (distToSegment(x, y, x1, y1, x2, y2) < threshold) return a;
  }
  return null;
}

function distToSegment(x, y, x1, y1, x2, y2) {
  const A = x - x1, B = y - y1, C = x2 - x1, D = y2 - y1;
  const dot = A * C + B * D;
  const lenSq = C * C + D * D;
  let param = -1;
  if (lenSq !== 0) param = dot / lenSq;
  let xx, yy;
  if (param < 0) { xx = x1; yy = y1; }
  else if (param > 1) { xx = x2; yy = y2; }
  else { xx = x1 + param * C; yy = y1 + param * D; }
  return Math.hypot(x - xx, y - yy);
}

canvas.addEventListener('contextmenu', e => {
  e.preventDefault();
  if (isPlaying) return;
  const { x, y } = scalePos(e);
  
  const nt = getNote(x, y);
  if (nt) { saveState(); notes = notes.filter(n => n.id !== nt.id); if (selected === nt) selected = null; draw(); return; }

  if (currentStage === 'create') {
    const obj = getStageObj(x, y);
    if (obj) { saveState(); stageObjects = stageObjects.filter(o => o !== obj); if (selected && selected.id === obj.id) selected = null; draw(); return; }
  }

  const arr = getArrow(x, y);
  if (arr) { saveState(); arrows = arrows.filter(a => a !== arr); resetSeekbar(); draw(); return; }
});

canvas.addEventListener('mousedown', onDown);
canvas.addEventListener('mousemove', e => {
  // ホバー時カーソル変更（クリエイトステージ）
  if (!mouseDown && currentStage === 'create' && mode === 'move') {
    const { x, y } = scalePos(e);
    if (selected && stageObjects.find(o => o.id === selected.id)) {
      const h = getResizeHandle(selected, x, y);
      if (h) { canvas.style.cursor = getResizeCursor(h); onMove(e); return; }
    }
    canvas.style.cursor = getStageObj(x, y) ? 'move' : 'crosshair';
  }
  onMove(e);
});
canvas.addEventListener('mouseup', onUp);

let touchTimer = null;
canvas.addEventListener('touchstart', e => {
  if (e.touches.length > 1) return;
  onDown(e);
  const { x, y } = scalePos(e);
  const nt = getNote(x, y);
  const arr = getArrow(x, y);
  if (nt || arr) {
    touchTimer = setTimeout(() => {
      saveState();
      if (nt) notes = notes.filter(n => n.id !== nt.id);
      else if (arr) arrows = arrows.filter(a => a !== arr);
      mouseDown = false; dragging = null; arrowDrag = null; activeRoutePoints = null;
      resetSeekbar();
      draw();
    }, 600);
  }
}, { passive: true });

canvas.addEventListener('touchmove', e => {
  if (touchTimer) { clearTimeout(touchTimer); touchTimer = null; }
  onMove(e);
}, { passive: true });

canvas.addEventListener('touchend', e => {
  if (touchTimer) { clearTimeout(touchTimer); touchTimer = null; }
  onUp(e);
}, { passive: true });

let startChar = null;

function onDown(e) {
  if (isPlaying || e.button === 2) return;
  const { x, y } = scalePos(e);
  mouseDown = true;

  if (mode === 'move' && currentStage === 'create') {
    // まず選択中オブジェクトのリサイズハンドルを確認
    if (selected && selected.id && stageObjects.find(o => o.id === selected.id)) {
      const handle = getResizeHandle(selected, x, y);
      if (handle) {
        resizingObj = selected;
        resizeHandle = handle;
        const { x: ox, y: oy, w: ow, h: oh } = objPx(selected);
        resizeStartData = { mx: x, my: y, ox, oy, ow, oh, nx: selected.nx, ny: selected.ny, nw: selected.nw, nh: selected.nh };
        draw();
        return;
      }
    }
    // キャラ・メモを優先（図形より先に判定）
    const ch = getChar(x, y);
    const nt = getNote(x, y);
    if (ch) {
      handleSelection(ch); dragging = { type: 'char', target: ch };
      dragOffX = x - cx(ch); dragOffY = y - cy(ch); moveStartPos = { nx: ch.nx, ny: ch.ny };
      draw(); return;
    } else if (nt) {
      handleSelection(nt); dragging = { type: 'note', target: nt };
      dragOffX = x - (nt.nx * W); dragOffY = y - (nt.ny * H); moveStartPos = { nx: nt.nx, ny: nt.ny };
      draw(); return;
    }
    // 既存オブジェクトをクリック → 移動
    const obj = getStageObj(x, y);
    if (obj) {
      selected = obj;
      draggingObj = obj;
      dragOffX = x - obj.nx * W;
      dragOffY = y - obj.ny * H;
      moveStartPos = { nx: obj.nx, ny: obj.ny, nw: obj.nw, nh: obj.nh };
      draw();
      return;
    }
    // 空きスペース → 新規図形のドラッグ描画開始
    selected = null;
    objDrawStart = { x, y, x2: x, y2: y };
    draw();
    return;
  }

  if (mode === 'move') {
    // もしタイムラインが途中の状態でコマを動かしたら、シーク位置をゼロに戻す
    if (currentProgressFrame > 0) {
      currentProgressFrame = 0;
      resetSeekbar();
    }

    const ch = getChar(x, y);
    const nt = getNote(x, y);
    if (ch) {
      handleSelection(ch); dragging = { type: 'char', target: ch };
      dragOffX = x - cx(ch); dragOffY = y - cy(ch); moveStartPos = { nx: ch.nx, ny: ch.ny };
    } else if (nt) {
      handleSelection(nt); dragging = { type: 'note', target: nt };
      dragOffX = x - (nt.nx * W); dragOffY = y - (nt.ny * H); moveStartPos = { nx: nt.nx, ny: nt.ny };
    } else { handleSelection(null); }
    draw();
  } 
  else if (mode === 'arrow') {
    startChar = getChar(x, y);
    arrowDrag = { x1: x, y1: y, x2: x, y2: y, arrowType: currentArrowType, startCharId: startChar ? startChar.id : null, team: startChar ? startChar.team : 'A' };
    draw();
  } 
  else if (mode === 'route') {
    if (currentProgressFrame > 0) {
      currentProgressFrame = 0;
      resetSeekbar();
    }
    startChar = getChar(x, y);
    if (startChar) {
      activeRoutePoints = [{ nx: startChar.nx, ny: startChar.ny }];
      info.textContent = `${startChar.role} の移動ルートを描画中...`;
    } else {
      // 矢印の終点付近からもルート開始できる
      const tipArrow = getArrowNearTip(x, y);
      if (tipArrow) {
        // 紐づくキャラを特定
        const linkedChar = chars.find(c => c.id === tipArrow.startCharId) || null;
        if (linkedChar) {
          startChar = linkedChar;
          let startNx, startNy;
          if (tipArrow.arrowType === 'route' && tipArrow.points && tipArrow.points.length > 1) {
            const last = tipArrow.points[tipArrow.points.length - 1];
            startNx = last.nx; startNy = last.ny;
          } else if (tipArrow.x2 !== undefined) {
            startNx = tipArrow.x2 / W; startNy = tipArrow.y2 / H;
          } else {
            startNx = linkedChar.nx; startNy = linkedChar.ny;
          }
          activeRoutePoints = [{ nx: startNx, ny: startNy }];
          info.textContent = `${linkedChar.role} の矢印終点からルートを継続中...`;
        } else {
          mouseDown = false;
          info.textContent = 'ルート描画モード：キャラクターまたは矢印の終点からドラッグしてください。';
        }
      } else {
        mouseDown = false;
        info.textContent = 'ルート描画モード：キャラクターまたは矢印の終点からドラッグしてください。';
      }
    }
  }
  else if (mode === 'text') {
    mouseDown = false;
    showMemoInput(x, y);
  }
}

function onMove(e) {
  if (!mouseDown || isPlaying) return;
  const { x, y } = scalePos(e);

  // リサイズ中
  if (resizingObj) {
    const d = resizeStartData;
    const dx = x - d.mx, dy = y - d.my;
    let nx = d.nx, ny = d.ny, nw = d.nw, nh = d.nh;
    const minW = 10/W, minH = 10/H;
    if (resizeHandle.includes('e')) { nw = Math.max(minW, d.nw + dx/W); }
    if (resizeHandle.includes('s')) { nh = Math.max(minH, d.nh + dy/H); }
    if (resizeHandle.includes('w')) { const dw = Math.min(dx/W, d.nw - minW); nx = d.nx + dw; nw = d.nw - dw; }
    if (resizeHandle.includes('n')) { const dh = Math.min(dy/H, d.nh - minH); ny = d.ny + dh; nh = d.nh - dh; }
    resizingObj.nx = nx; resizingObj.ny = ny; resizingObj.nw = nw; resizingObj.nh = nh;
    draw(); return;
  }

  // 新規図形プレビュー
  if (objDrawStart) {
    objDrawStart.x2 = x; objDrawStart.y2 = y;
    draw(); return;
  }

  // オブジェクト移動
  if (draggingObj) {
    draggingObj.nx = Math.max(0, Math.min(1 - draggingObj.nw, (x - dragOffX) / W));
    draggingObj.ny = Math.max(0, Math.min(1 - draggingObj.nh, (y - dragOffY) / H));
    draw(); return;
  }

  // カーソル変更（ホバー時）
  if (currentStage === 'create' && mode === 'move' && selected && stageObjects.find(o=>o.id===selected.id)) {
    const h = getResizeHandle(selected, x, y);
    canvas.style.cursor = h ? getResizeCursor(h) : (getStageObj(x,y) ? 'move' : 'crosshair');
  }

  if (mode === 'move' && dragging) {
    if (dragging.type === 'char') {
      const rad = r();
      dragging.target.nx = Math.max(rad / W, Math.min(1 - rad / W, (x - dragOffX) / W));
      dragging.target.ny = Math.max(rad / H, Math.min(1 - rad / H, (y - dragOffY) / H));
    } else if (dragging.type === 'note') {
      dragging.target.nx = Math.max(0.02, Math.min(0.98, (x - dragOffX) / W));
      dragging.target.ny = Math.max(0.02, Math.min(0.98, (y - dragOffY) / H));
    }
    draw();
  } 
  else if (mode === 'arrow' && arrowDrag) {
    arrowDrag.x2 = x; arrowDrag.y2 = y;
    draw();
  } 
  else if (mode === 'route' && activeRoutePoints && startChar) {
    const lastPt = activeRoutePoints[activeRoutePoints.length - 1];
    const curNx = x / W, curNy = y / H;
    if (Math.hypot((curNx - lastPt.nx)*W, (curNy - lastPt.ny)*H) > 6) {
      activeRoutePoints.push({ nx: curNx, ny: curNy });
      draw();
    }
  }
}

function onUp(e) {
  if (!mouseDown || isPlaying) return;
  mouseDown = false;

  if (mode === 'move' && dragging) {
    if (moveStartPos && (moveStartPos.nx !== dragging.target.nx || moveStartPos.ny !== dragging.target.ny)) {
      saveState();
    }
    moveStartPos = null;
  }

  if (mode === 'arrow' && arrowDrag) {
    const dx = arrowDrag.x2 - arrowDrag.x1, dy = arrowDrag.y2 - arrowDrag.y1;
    if (Math.hypot(dx, dy) > 12) {
      const endChar = getChar(arrowDrag.x2, arrowDrag.y2);
      if (currentArrowType === 'follow' && startChar && endChar && startChar.id !== endChar.id) {
        saveState();
        arrows.push({ x1: 0, y1: 0, x2: 0, y2: 0, arrowType: 'follow', startCharId: startChar.id, endCharId: endChar.id, team: startChar.team });
      } else {
        saveState();
        arrows.push({ ...arrowDrag, startCharId: startChar ? startChar.id : null, team: startChar ? startChar.team : 'A' });
      }
      resetSeekbar();
    }
    arrowDrag = null; startChar = null; draw();
  }

  if (mode === 'route' && activeRoutePoints && startChar) {
    if (activeRoutePoints.length > 2) {
      saveState();
      arrows.push({
        arrowType: 'route',
        startCharId: startChar.id,
        team: startChar.team,
        points: activeRoutePoints
      });
      info.textContent = `${startChar.role} のオリジナル移動ルートを保存しました。`;
      resetSeekbar();
    }
    activeRoutePoints = null; startChar = null; draw();
  }
  dragging = null;

  // リサイズ終了
  if (resizingObj) {
    saveState();
    resizingObj = null; resizeHandle = null; resizeStartData = null;
    canvas.style.cursor = 'default';
    draw();
    return;
  }

  // 新規図形確定
  if (objDrawStart) {
    const x1 = Math.min(objDrawStart.x, objDrawStart.x2);
    const y1 = Math.min(objDrawStart.y, objDrawStart.y2);
    const x2 = Math.max(objDrawStart.x, objDrawStart.x2);
    const y2 = Math.max(objDrawStart.y, objDrawStart.y2);
    const nw = (x2 - x1) / W, nh = (y2 - y1) / H;
    if (nw * W > 10 && nh * H > 10) {
      saveState();
      const color = document.getElementById('obj-color-pick').value;
      const opacity = parseInt(document.getElementById('obj-opacity').value);
      const newObj = { id: 'OBJ_' + Date.now(), shape: selectedShapeType, color, opacity, nx: x1/W, ny: y1/H, nw, nh };
      stageObjects.push(newObj);
      selected = newObj;
    }
    objDrawStart = null;
    draw();
    return;
  }

  // 移動終了
  if (draggingObj) {
    if (moveStartPos && (moveStartPos.nx !== draggingObj.nx || moveStartPos.ny !== draggingObj.ny)) {
      saveState();
    }
    draggingObj = null; moveStartPos = null;
    draw();
  }
}

// ==========================================
// キャンバス描画
// ==========================================
function rr(x, y, w, h, rad) { ctx.beginPath(); ctx.roundRect(x, y, w, h, rad || 0); }

function drawArrow(x1, y1, x2, y2, arrowType, preview, isTargetFriendly, inRedLockZone, charId, isMutual) {
  let ang = Math.atan2(y2 - y1, x2 - x1);
  let len = Math.hypot(x2 - x1, y2 - y1);
  if (len < 5) return;

  let offsetX = 0, offsetY = 0;
  if (isMutual && arrowType === 'follow' && !preview) {
    const shiftDist = 8;
    offsetX = Math.cos(ang + Math.PI / 2) * shiftDist;
    offsetY = Math.sin(ang + Math.PI / 2) * shiftDist;
    x1 += offsetX; y1 += offsetY; x2 += offsetX; y2 += offsetY;
  }

  let startX = x1, startY = y1;
  let endX = x2 - Math.cos(ang) * 12, endY = y2 - Math.sin(ang) * 12;

  if (!preview && arrowType === 'follow') {
    const radius = r();
    if (len > radius * 2) {
      startX = x1 + Math.cos(ang) * radius; startY = y1 + Math.sin(ang) * radius;
      endX = x2 - Math.cos(ang) * (radius + 6); endY = y2 - Math.sin(ang) * (radius + 6);
    }
  }

  let baseColor = charColor(charId);
  const isRedLockActive = (!preview && arrowType === 'follow' && !isTargetFriendly && inRedLockZone);

  ctx.save();
  if (isRedLockActive) {
    ctx.shadowBlur = 20; ctx.shadowColor = baseColor; ctx.lineWidth = 10.0;
    ctx.beginPath(); ctx.moveTo(startX, startY); ctx.lineTo(endX, endY);
    ctx.strokeStyle = baseColor; ctx.stroke();
    ctx.lineWidth = 4.5; ctx.strokeStyle = '#FFFFFF'; ctx.stroke();
  } else {
    ctx.beginPath(); ctx.moveTo(startX, startY); ctx.lineTo(endX, endY);
    ctx.strokeStyle = preview ? 'rgba(255,255,255,0.5)' : baseColor;
    if (arrowType === 'normal') { ctx.lineWidth = 2.5; ctx.setLineDash([4, 4]); } 
    else { ctx.lineWidth = 3.5; ctx.setLineDash([]); }
    if (preview) { ctx.setLineDash([6, 4]); }
    ctx.stroke();
  }
  ctx.restore();

  let headSize = isRedLockActive ? 22 : 14;
  const headX = x2 - (preview ? Math.cos(ang)*12 : (arrowType === 'follow' ? Math.cos(ang)*(r()+6) : Math.cos(ang)*12));
  const headY = y2 - (preview ? Math.sin(ang)*12 : (arrowType === 'follow' ? Math.sin(ang)*(r()+6) : Math.sin(ang)*12));

  ctx.save();
  if (isRedLockActive) { ctx.shadowBlur = 15; ctx.shadowColor = baseColor; }
  ctx.beginPath(); ctx.moveTo(headX + Math.cos(ang) * headSize, headY + Math.sin(ang) * headSize);
  ctx.lineTo(headX - Math.cos(ang - 0.45) * (headSize + 2), headY - Math.sin(ang - 0.45) * (headSize + 2));
  ctx.lineTo(headX - Math.cos(ang + 0.45) * (headSize + 2), headY - Math.sin(ang + 0.45) * (headSize + 2));
  ctx.closePath();
  ctx.fillStyle = preview ? 'rgba(255,255,255,0.5)' : (isRedLockActive ? '#FFFFFF' : baseColor); ctx.fill();
  ctx.restore();
}

function drawRoute(points, charId) {
  if (!points || points.length < 2) return;
  let baseColor = charColor(charId);

  ctx.save();
  ctx.lineWidth = 3.5;
  ctx.strokeStyle = baseColor;
  ctx.setLineDash([2, 4]);

  ctx.beginPath();
  ctx.moveTo(points[0].nx * W, points[0].ny * H);
  for (let i = 1; i < points.length; i++) {
    ctx.lineTo(points[i].nx * W, points[i].ny * H);
  }
  ctx.stroke();
  ctx.restore();

  const pLast = points[points.length - 1];
  const pPrev = points[points.length - 2];
  const lx = pLast.nx * W, ly = pLast.ny * H;
  const px = pPrev.nx * W, py = pPrev.ny * H;
  let ang = Math.atan2(ly - py, lx - px);

  ctx.save();
  ctx.beginPath();
  ctx.moveTo(lx, ly);
  ctx.lineTo(lx - Math.cos(ang - 0.45) * 14, ly - Math.sin(ang - 0.45) * 14);
  ctx.lineTo(lx - Math.cos(ang + 0.45) * 14, ly - Math.sin(ang + 0.45) * 14);
  ctx.closePath();
  ctx.fillStyle = baseColor;
  ctx.fill();
  ctx.restore();
}

function drawChar(ch) {
  const x = cx(ch), y = cy(ch), rad = r();
  const sel = selected && selected.id === ch.id;
  const col  = ch.color;
  const dark = ch.colorDark;

  let shouldDrawCircle = (lockCircleState === 'all' || (lockCircleState === 'selected' && sel));
  if (shouldDrawCircle) {
    // col を rgba に変換してアルファを下げる
    ctx.beginPath(); ctx.arc(x, y, scaledRedLock(ch), 0, Math.PI * 2);
    ctx.strokeStyle = col + '66';
    ctx.lineWidth = 2; ctx.stroke();
  }

  if (sel) {
    ctx.beginPath(); ctx.arc(x, y, rad + 8, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(255,255,255,0.6)'; ctx.lineWidth = 1.5; ctx.setLineDash([4, 3]); ctx.stroke(); ctx.setLineDash([]);
  }

  ctx.beginPath(); ctx.arc(x + 2, y + 2, rad, 0, Math.PI * 2); ctx.fillStyle = 'rgba(0,0,0,0.4)'; ctx.fill();

  if (ch.isAwaken) {
    ctx.save();
    ctx.shadowColor = '#ff5500';
    ctx.shadowBlur = 18;
    ctx.beginPath(); ctx.arc(x, y, rad + 3, 0, Math.PI * 2);
    ctx.fillStyle = '#ffaa00'; ctx.fill();
    
    ctx.shadowColor = '#ffff00';
    ctx.shadowBlur = 8;
    ctx.beginPath(); ctx.arc(x, y, rad + 1, 0, Math.PI * 2);
    ctx.fillStyle = '#ffffff'; ctx.fill();
    ctx.restore();
  }

  ctx.save();
  ctx.beginPath(); ctx.arc(x, y, rad, 0, Math.PI * 2); ctx.fillStyle = col; ctx.fill();
  if (ch.img) {
    ctx.clip();
    const imgAspect = ch.img.width / ch.img.height;
    let drawW = rad * 2, drawH = rad * 2;
    if (imgAspect > 1) { drawW = rad * 2 * imgAspect; } else { drawH = (rad * 2) / imgAspect; }
    ctx.drawImage(ch.img, x - drawW / 2, y - drawH / 2, drawW, drawH);
  }
  ctx.restore();

  ctx.beginPath(); ctx.arc(x, y, rad, 0, Math.PI * 2); 
  ctx.strokeStyle = ch.isAwaken ? '#ffcc00' : dark; 
  ctx.lineWidth = ch.isAwaken ? 3.5 : 2.5; 
  ctx.stroke();

  if (!ch.img || sel) {
    const fontSize = Math.max(11, rad * 0.6);
    ctx.fillStyle = '#fff'; ctx.font = `bold ${fontSize}px 'Rajdhani', sans-serif`;
    ctx.shadowColor = 'rgba(0,0,0,0.9)'; ctx.shadowBlur = 4; ctx.textAlign = 'center';
    ctx.fillText(ch.label, x, y + fontSize * 0.35);
  }

  ctx.fillStyle = '#ffffff'; ctx.font = `bold ${Math.max(11, rad * 0.42)}px 'Noto Sans JP', sans-serif`;
  ctx.textAlign = 'center'; ctx.shadowColor = 'rgba(0, 1, 0, 1)'; ctx.shadowBlur = 5;
  ctx.shadowOffsetX = 1; ctx.shadowOffsetY = 1;
  ctx.fillText(ch.role, x, y + rad + 16);

  if (ch.isAwaken) {
    const badgeY = y - rad - 8;
    ctx.font = `bold ${Math.max(9, rad * 0.33)}px 'Rajdhani', sans-serif`;
    const bW = ctx.measureText("覚醒中").width + 8;
    const bH = 14;

    ctx.save();
    ctx.shadowBlur = 6; ctx.shadowColor = '#ff5500';
    ctx.fillStyle = '#ff5500';
    rr(x - bW/2, badgeY - bH/2, bW, bH, 3); ctx.fill();
    ctx.restore();

    ctx.fillStyle = '#ffffff';
    ctx.textBaseline = 'middle';
    ctx.fillText("覚醒中", x, badgeY);
    ctx.textBaseline = 'baseline';
  }

  ctx.shadowBlur = 0; ctx.shadowOffsetX = 0; ctx.shadowOffsetY = 0;
}

function drawNote(n) {
  const x = n.nx * W, y = n.ny * H;
  const sel = selected && selected.id === n.id;
  ctx.font = "12px 'Noto Sans JP', sans-serif";
  const tw = ctx.measureText(n.text).width + 12;
  const th = 22;

  ctx.save();
  ctx.shadowColor = 'rgba(0,0,0,0.3)'; ctx.shadowBlur = 4; ctx.shadowOffsetY = 2;
  ctx.fillStyle = sel ? 'rgba(0, 238, 102, 0.9)' : 'rgba(34, 41, 34, 0.85)';
  ctx.strokeStyle = sel ? '#ffffff' : '#4a5a4a';
  ctx.lineWidth = 1.5;
  rr(x - tw/2, y - th/2, tw, th, 4); ctx.fill(); ctx.stroke(); ctx.restore();

  ctx.fillStyle = sel ? '#000000' : '#c8d8c0';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(n.text, x, y);
}

function draw() {
  ctx.clearRect(0, 0, W, H);

  if (currentStage === 'furnace') {
    if (bgImageFurnace.complete && bgImageFurnace.naturalWidth > 0) {
      ctx.drawImage(bgImageFurnace, 0, 0, W, H);
    } else {
      // 画像未読み込み時は代替背景
      ctx.fillStyle = '#1a1010'; ctx.fillRect(0, 0, W, H);
    }
    ctx.fillStyle = 'rgba(0, 0, 0, 0.15)'; ctx.fillRect(0, 0, W, H);
  } else if (currentStage === 'create') {
    // 灰色背景
    ctx.fillStyle = '#606060'; ctx.fillRect(0, 0, W, H);
    // グリッド線
    const gs = W * 0.059;
    ctx.strokeStyle = 'rgba(255,255,255,0.12)'; ctx.lineWidth = 0.8;
    for (let gx = 0; gx <= W; gx += gs) { ctx.beginPath(); ctx.moveTo(gx, 0); ctx.lineTo(gx, H); ctx.stroke(); }
    for (let gy = 0; gy <= H; gy += gs) { ctx.beginPath(); ctx.moveTo(0, gy); ctx.lineTo(W, gy); ctx.stroke(); }
    // 太いグリッド（5マスごと）
    ctx.strokeStyle = 'rgba(255,255,255,0.22)'; ctx.lineWidth = 1.2;
    for (let gx = 0; gx <= W; gx += gs*5) { ctx.beginPath(); ctx.moveTo(gx, 0); ctx.lineTo(gx, H); ctx.stroke(); }
    for (let gy = 0; gy <= H; gy += gs*5) { ctx.beginPath(); ctx.moveTo(0, gy); ctx.lineTo(W, gy); ctx.stroke(); }
    // オブジェクト描画
    stageObjects.forEach(o => drawStageObject(o, selected && selected.id === o.id));
    // 新規ドラッグ中プレビュー
    if (objDrawStart) drawObjPreview(objDrawStart.x, objDrawStart.y, objDrawStart.x2, objDrawStart.y2);
  } else {
    const mx = W * 0.044, my = H * 0.063; const mw = W - mx * 2, mh = H - my * 2;
    ctx.fillStyle = '#222'; ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#808880'; rr(mx, my, mw, mh, 8); ctx.fill();
    ctx.strokeStyle = '#606660'; ctx.lineWidth = 2; rr(mx, my, mw, mh, 8); ctx.stroke();

    const gs = W * 0.059;
    ctx.strokeStyle = 'rgba(0,0,0,0.13)'; ctx.lineWidth = 0.8;
    for (let x = mx; x <= mx + mw; x += gs) { ctx.beginPath(); ctx.moveTo(x, my); ctx.lineTo(x, my + mh); ctx.stroke(); }
    for (let y = my; y <= my + mh; y += gs) { ctx.beginPath(); ctx.moveTo(mx, y); ctx.lineTo(mx + mw, y); ctx.stroke(); }

    const bx = W * 0.206, by = H * 0.667; const bw = W * 0.118, bh = H * 0.167;
    ctx.fillStyle = '#1a3a6a'; rr(bx, by, bw, bh, 4); ctx.fill();
    ctx.strokeStyle = '#2060bb'; ctx.lineWidth = 2; rr(bx, by, bw, bh, 4); ctx.stroke();

    const px = bx + bw * 0.175, py = by + bh * 0.15; const pw = bw * 0.65, ph = bh * 0.7;
    ctx.fillStyle = '#1a6a30'; rr(px, py, pw, ph, 3); ctx.fill();
    ctx.strokeStyle = '#00ee66'; ctx.lineWidth = 2.5; rr(px, py, pw, ph, 3); ctx.stroke();

    const rx = W * 0.544, ry = H * 0.167; const rw = W * 0.235, rh = H * 0.271;
    ctx.fillStyle = '#505a50'; rr(rx, ry, rw, rh, 5); ctx.fill();
    ctx.strokeStyle = '#404a40'; ctx.lineWidth = 2; rr(rx, ry, rw, rh, 5); ctx.stroke();
    ctx.fillStyle = '#3a4a3a'; rr(rx + rw * 0.094, ry + rh * 0.077, rw * 0.375, rh * 0.423, 4); ctx.fill();
    ctx.fillStyle = '#3a4a3a'; rr(rx + rw * 0.531, ry + rh * 0.115, rw * 0.375, rh * 0.731, 4); ctx.fill();
  }

  arrows.forEach(a => {
    if (a.arrowType === 'route') {
      drawRoute(a.points, a.startCharId);
    } else if (a.arrowType === 'follow') {
      const sCh = chars.find(c => c.id === a.startCharId);
      const eCh = chars.find(c => c.id === a.endCharId);
      if (sCh && eCh) {
        const isFriendly = (sCh.team === eCh.team);
        const distance = Math.hypot(cx(sCh) - cx(eCh), cy(sCh) - cy(eCh));
        const inRedLockZone = distance <= scaledRedLock(sCh);
        const isMutual = arrows.some(other => other.arrowType === 'follow' && other.startCharId === a.endCharId && other.endCharId === a.startCharId);
        drawArrow(cx(sCh), cy(sCh), cx(eCh), cy(eCh), 'follow', false, isFriendly, inRedLockZone, a.startCharId, isMutual);
      }
    } else {
      drawArrow(a.x1, a.y1, a.x2, a.y2, a.arrowType || 'normal', false, false, false, a.startCharId, false);
    }
  });

  if (arrowDrag) { 
    drawArrow(arrowDrag.x1, arrowDrag.y1, arrowDrag.x2, arrowDrag.y2, arrowDrag.arrowType, true, false, false, arrowDrag.startCharId, false); 
  }

  if (activeRoutePoints && startChar) {
    const tempPoints = activeRoutePoints.map(p => ({ nx: p.nx, ny: p.ny }));
    drawRoute(tempPoints, startChar.id);
  }

  chars.forEach(drawChar);
  notes.forEach(drawNote);

  // ルートモード時：矢印終点にヒントを描画
  if (mode === 'route' && !activeRoutePoints) {
    arrows.forEach(a => {
      let tx, ty;
      if (a.arrowType === 'route' && a.points && a.points.length > 1) {
        const last = a.points[a.points.length - 1];
        tx = last.nx * W; ty = last.ny * H;
      } else if (a.arrowType !== 'follow' && a.x2 !== undefined && a.startCharId) {
        tx = a.x2; ty = a.y2;
      } else return;
      const col = charColor(a.startCharId);
      ctx.save();
      ctx.beginPath();
      ctx.arc(tx, ty, 8, 0, Math.PI * 2);
      ctx.strokeStyle = col;
      ctx.lineWidth = 2;
      ctx.setLineDash([3, 3]);
      ctx.globalAlpha = 0.7 + 0.3 * Math.sin(Date.now() / 300);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.restore();
    });
    requestAnimationFrame(draw);
  }
}

function undo() {
  if (undoStack.length === 0 || isPlaying) return;
  redoStack.push(createSnapshot());
  const snap = undoStack.pop();
  restoreSnapshot(snap);
}

function redo() {
  if (redoStack.length === 0 || isPlaying) return;
  undoStack.push(createSnapshot());
  const snap = redoStack.pop();
  restoreSnapshot(snap);
}

// ==========================================
// メモ入力オーバーレイ
// ==========================================
let memoOverlayNx = 0, memoOverlayNy = 0;

function showMemoInput(canvasX, canvasY) {
  const overlay = document.getElementById('memo-input-overlay');
  const field = document.getElementById('memo-input-field');
  const wrapper = document.getElementById('canvas-wrapper');
  const wrapperRect = wrapper.getBoundingClientRect();
  const canvasRect = canvas.getBoundingClientRect();

  // canvasRect relative to wrapper
  const relX = (canvasRect.left - wrapperRect.left) + (canvasX / W) * canvasRect.width;
  const relY = (canvasRect.top - wrapperRect.top) + (canvasY / H) * canvasRect.height;

  memoOverlayNx = canvasX / W;
  memoOverlayNy = canvasY / H;

  overlay.style.left = Math.min(relX + 8, wrapperRect.width - 220) + 'px';
  overlay.style.top = Math.max(relY - 10, 4) + 'px';
  overlay.style.display = 'block';
  field.value = '';
  setTimeout(() => field.focus(), 50);
}

function commitMemoInput() {
  const field = document.getElementById('memo-input-field');
  const text = field.value.trim();
  document.getElementById('memo-input-overlay').style.display = 'none';
  if (text) {
    saveState();
    notes.push({ id: 'N_' + Date.now(), text, nx: memoOverlayNx, ny: memoOverlayNy });
    draw();
  }
}

function cancelMemoInput() {
  document.getElementById('memo-input-overlay').style.display = 'none';
}

function applyMapSize(val) {
  const v = parseInt(val);
  document.getElementById('map-size-label').textContent = v + 'px';
  const displayH = v;
  const displayW = Math.round(displayH * (680 / 480));
  canvas.style.width = displayW + 'px';
  canvas.style.height = displayH + 'px';
  canvas.style.display = 'block';
  canvas.style.margin = '0 auto';
}

window.addEventListener('resize', resize);
window.onload = function() {
  currentStage = 'training';
  resize();
  resetSeekbar();
  draw();

  document.getElementById('memo-ok-btn').addEventListener('click', commitMemoInput);
  document.getElementById('memo-cancel-btn').addEventListener('click', cancelMemoInput);
  document.getElementById('memo-input-field').addEventListener('keydown', e => {
    if (e.key === 'Enter') commitMemoInput();
    if (e.key === 'Escape') cancelMemoInput();
  });
};
</script>
</body>
